# Litestream configuration for replicating SQLite to S3-compatible storage (Tigris).
# All values use environment variables so secrets stay out of the image.

dbs:
  - path: ${WF_DB_PATH:-/data/wealthfolio.db}
    replicas:
      - type: s3
        bucket: ${LITESTREAM_REPLICA_BUCKET}
        path: wealthfolio
        endpoint: ${LITESTREAM_REPLICA_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        # Tigris uses virtual-hosted-style (like AWS S3)
        force-path-style: false
        # Sync interval — how often WAL frames are pushed (default 1s is fine)
        sync-interval: 1s
